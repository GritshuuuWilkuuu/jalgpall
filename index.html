<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>La Clásica – Barcelona vs Real Madrid</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root {
    --barca-blue: #004D98;
    --barca-red: #A50044;
    --barca-gold: #EDBB00;
    --madrid-white: #F5F5F5;
    --madrid-gold: #C0A040;
    --bg: #0a0e1a;
    --field-green: #2d7a2d;
    --field-light: #337a33;
    --hud-bg: rgba(0,0,0,0.75);
  }
  * { margin:0; padding:0; box-sizing:border-box; touch-action:none; user-select:none; -webkit-user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Rajdhani',sans-serif; }

  #gameWrapper {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at center, #0d1526 0%, #050810 100%);
  }

  canvas { display:block; image-rendering:pixelated; }

  /* ── HUD ── */
  #hud {
    position:absolute; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 12px;
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
    pointer-events:none;
  }
  #hud .team { display:flex; align-items:center; gap:8px; }
  #hud .badge { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; font-family:'Oswald',sans-serif; }
  #hud .badge.barca { background: linear-gradient(135deg, var(--barca-blue) 50%, var(--barca-red) 50%); }
  #hud .badge.madrid { background: linear-gradient(135deg, var(--madrid-gold) 30%, var(--madrid-white) 30%); color:#333; }
  #hud .score { font-family:'Oswald',sans-serif; font-size:28px; font-weight:700; color:#fff; letter-spacing:2px; text-shadow: 0 0 12px rgba(237,187,0,0.7); }
  #hud .colon { color:var(--barca-gold); }
  #hud .timer-wrap { text-align:center; }
  #hud .timer { font-family:'Oswald',sans-serif; font-size:22px; font-weight:600; color:var(--barca-gold); letter-spacing:1px; }
  #hud .half-label { font-size:10px; color:rgba(255,255,255,0.5); text-align:center; letter-spacing:2px; text-transform:uppercase; }

  /* ── SCREENS ── */
  .screen {
    position:absolute; inset:0;
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 50% 40%, #0d1a35 0%, #050810 100%);
    z-index:100;
  }
  .screen.active { display:flex; }

  .screen-logo {
    font-family:'Oswald',sans-serif;
    font-size:clamp(18px,5vw,36px);
    font-weight:700;
    letter-spacing:4px;
    color:var(--barca-gold);
    text-shadow: 0 0 30px rgba(237,187,0,0.5);
    margin-bottom:4px;
  }
  .screen-sub {
    font-family:'Rajdhani',sans-serif;
    font-size:clamp(12px,3vw,16px);
    color:rgba(255,255,255,0.5);
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:30px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    padding:24px 32px;
    width:min(90vw,360px);
    display:flex; flex-direction:column; gap:14px;
    backdrop-filter:blur(8px);
  }

  .btn {
    font-family:'Oswald',sans-serif;
    font-size:17px; font-weight:600; letter-spacing:2px;
    border:none; border-radius:8px; padding:13px 24px;
    cursor:pointer; transition:all .2s;
    text-transform:uppercase;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--barca-blue), #0062be);
    color:#fff;
    box-shadow: 0 4px 20px rgba(0,77,152,0.4);
  }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 6px 28px rgba(0,77,152,0.6); }
  .btn-secondary {
    background: linear-gradient(135deg, var(--barca-red), #c8004f);
    color:#fff;
    box-shadow: 0 4px 20px rgba(165,0,68,0.4);
  }
  .btn-secondary:hover { transform:translateY(-2px); }
  .btn-ghost {
    background:transparent; border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.7);
  }
  .btn-ghost:hover { background:rgba(255,255,255,0.08); }

  .input-field {
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:8px; color:#fff;
    font-family:'Oswald',sans-serif;
    font-size:22px; font-weight:600; letter-spacing:4px;
    padding:12px 16px; text-align:center; width:100%;
    outline:none; transition:border .2s;
  }
  .input-field:focus { border-color:var(--barca-gold); }
  .input-field::placeholder { color:rgba(255,255,255,0.25); font-size:14px; letter-spacing:2px; }

  .divider { display:flex; align-items:center; gap:12px; color:rgba(255,255,255,0.25); font-size:12px; letter-spacing:2px; }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.1); }

  #codeDisplay {
    font-family:'Oswald',sans-serif;
    font-size:36px; font-weight:700; letter-spacing:8px;
    color:var(--barca-gold);
    text-align:center;
    text-shadow:0 0 20px rgba(237,187,0,0.4);
  }
  .code-label { font-size:11px; color:rgba(255,255,255,0.4); text-align:center; letter-spacing:3px; text-transform:uppercase; }

  .status-dot {
    display:inline-block; width:8px; height:8px; border-radius:50%;
    background:var(--barca-gold); margin-right:8px;
    animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

  #statusMsg {
    color:rgba(255,255,255,0.6); font-size:14px; text-align:center; letter-spacing:1px;
  }
  #errorMsg { color:#ff4d6d; font-size:13px; text-align:center; min-height:18px; }

  /* Halftime / Fulltime */
  .ht-title {
    font-family:'Oswald',sans-serif; font-size:clamp(24px,8vw,56px);
    font-weight:700; color:#fff; letter-spacing:4px;
    text-transform:uppercase; text-align:center;
    text-shadow:0 0 40px rgba(237,187,0,0.5);
    margin-bottom:8px;
  }
  .ht-score {
    font-family:'Oswald',sans-serif; font-size:clamp(40px,12vw,88px);
    font-weight:700; color:var(--barca-gold); letter-spacing:8px;
    text-shadow:0 0 40px rgba(237,187,0,0.6);
    margin-bottom:20px;
  }
  .ht-teams {
    display:flex; gap:32px; align-items:center;
    font-family:'Oswald',sans-serif; font-size:clamp(12px,3.5vw,20px);
    font-weight:600; letter-spacing:3px; color:rgba(255,255,255,0.7);
    margin-bottom:24px;
  }
  .ht-teams .sep { color:var(--barca-gold); font-size:0.8em; }
  .ht-countdown {
    font-family:'Oswald',sans-serif; font-size:clamp(14px,4vw,22px);
    color:rgba(255,255,255,0.45); letter-spacing:2px; margin-top:8px;
  }
  .winner-label {
    font-family:'Rajdhani',sans-serif; font-size:clamp(13px,3.5vw,18px);
    letter-spacing:3px; color:rgba(255,255,255,0.5);
    text-transform:uppercase; margin-bottom:6px;
  }
  .winner-name {
    font-family:'Oswald',sans-serif; font-size:clamp(22px,7vw,44px);
    font-weight:700; letter-spacing:4px; text-transform:uppercase;
    color:var(--barca-gold); text-shadow:0 0 30px rgba(237,187,0,0.6);
  }

  /* Goal notification */
  #goalNotif {
    position:absolute; top:60px; left:50%; transform:translateX(-50%) scale(0);
    background: linear-gradient(135deg, rgba(237,187,0,0.95), rgba(200,140,0,0.95));
    color:#000; font-family:'Oswald',sans-serif;
    font-size:clamp(16px,5vw,26px); font-weight:700; letter-spacing:3px;
    padding:10px 28px; border-radius:50px;
    box-shadow:0 6px 30px rgba(237,187,0,0.5);
    pointer-events:none; white-space:nowrap;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1);
    z-index:200;
  }
  #goalNotif.show { transform:translateX(-50%) scale(1); }

  /* Touch controls */
  #touchLeft, #touchRight {
    position:absolute; bottom:0;
    display:none; align-items:flex-end; justify-content:center;
    padding-bottom:20px;
    pointer-events:all;
  }
  #touchLeft { left:0; width:50%; justify-content:flex-start; padding-left:16px; }
  #touchRight { right:0; width:50%; justify-content:flex-end; padding-right:16px; }

  #joystickWrap {
    position:relative; width:110px; height:110px;
  }
  #joystickBase {
    position:absolute; inset:0; border-radius:50%;
    background:rgba(255,255,255,0.08);
    border:2px solid rgba(255,255,255,0.2);
  }
  #joystickKnob {
    position:absolute; width:46px; height:46px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.35), rgba(255,255,255,0.12));
    border:2px solid rgba(255,255,255,0.3);
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    transition:transform .05s;
  }

  #kickBtn {
    width:80px; height:80px; border-radius:50%;
    background: radial-gradient(circle at 35% 35%, #A50044, #6a002b);
    border:3px solid rgba(255,100,100,0.4);
    box-shadow:0 4px 20px rgba(165,0,68,0.6);
    display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-size:14px; font-weight:700;
    color:#fff; letter-spacing:2px;
    cursor:pointer; pointer-events:all;
    transition:transform .1s, box-shadow .1s;
  }
  #kickBtn:active, #kickBtn.pressed {
    transform:scale(0.9);
    box-shadow:0 2px 10px rgba(165,0,68,0.4);
  }

  /* Rotation prompt */
  #rotatePrompt {
    display:none; position:fixed; inset:0; z-index:999;
    background:#000; flex-direction:column;
    align-items:center; justify-content:center; gap:20px;
    color:#fff;
  }
  #rotatePrompt svg { animation:spin 2s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  #rotatePrompt p { font-family:'Oswald',sans-serif; font-size:20px; letter-spacing:3px; color:rgba(255,255,255,0.7); }

  @media (orientation:portrait) and (max-width:600px) {
    #rotatePrompt { display:flex; }
  }
</style>
</head>
<body>

<!-- Rotation prompt -->

    <circle cx="12" cy="18.5" r="1"/>

  <p>PÖÖRA TELEFON KÜLILI</p>
</div>

  <!-- HALFTIME SCREEN -->
  <div class="screen" id="screenHalftime">
    <div class="ht-title">Vaheaeg</div>
    <div class="ht-teams"><span id="htBarcaName">FC BARCELONA</span><span class="sep">·</span><span>REAL MADRID</span></div>
    <div class="ht-score"><span id="htScoreA">0</span> : <span id="htScoreB">0</span></div>
    <div class="ht-countdown" id="htCountdown">Jätkub 5 sekundi pärast…</div>
  </div>

  <!-- FULLTIME SCREEN -->
  <div class="screen" id="screenFulltime">
    <div class="ht-title">Mäng läbi!</div>
    <div class="ht-teams"><span>FC BARCELONA</span><span class="sep">·</span><span>REAL MADRID</span></div>
    <div class="ht-score"><span id="ftScoreA">0</span> : <span id="ftScoreB">0</span></div>
    <div class="winner-label" id="ftWinnerLabel">Võitja</div>
    <div class="winner-name" id="ftWinnerName">—</div>
    <div style="margin-top:28px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center;">
      <button class="btn btn-primary" id="btnRestart" style="display:none;">Uus mäng</button>
      <button class="btn btn-ghost" onclick="location.reload()">Tagasi menüüsse</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const W = 800, H = 480;
const HALF_DUR = 120; // seconds
const GOAL_COOLDOWN = 2500;
const PLAYER_SPEED = 3.2;
const BALL_FRICTION = 0.982;
const KICK_POWER = 9;
const PLAYER_R = 13;
const BALL_R = 9;

// Field bounds
const FX1 = 60, FX2 = W - 60, FY1 = 50, FY2 = H - 50;
const FW = FX2 - FX1, FH = FY2 - FY1;
// Goal
const GOAL_W = 14, GOAL_H = 80;
const GOAL_Y1 = H / 2 - GOAL_H / 2, GOAL_Y2 = H / 2 + GOAL_H / 2;
const BARCA_GOAL_X = FX1;   // left
const MADRID_GOAL_X = FX2;  // right

// Formations: [x, y] normalized 0..1 within field (x from own half)
const FORM = [
  [0.06, 0.5],    // GK
  [0.22, 0.25],   // DEF1
  [0.22, 0.75],   // DEF2
  [0.45, 0.5],    // MID
  [0.65, 0.5],    // FWD
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let role = null; // 'host' | 'guest'
let peer = null, conn = null;

const state = {
  ball: { x: W/2, y: H/2, vx: 0, vy: 0 },
  players: [], // {team:0|1, idx, x,y,vx,vy,kick,controlled}
  score: [0, 0],
  half: 1,
  time: HALF_DUR,
  phase: 'play', // 'play','goal','halftime','fulltime'
  goalCooldown: 0,
  sidesSwapped: false,
  lastGoalTeam: -1,
  input: { h: { dx:0, dy:0, kick:false }, g: { dx:0, dy:0, kick:false } },
};

// ═══════════════════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wr = window.innerWidth, wh = window.innerHeight;
  const scale = Math.min(wr / W, wh / H);
  canvas.width = W; canvas.height = H;
  canvas.style.width = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
  // Scale HUD and controls to match
  const hud = document.getElementById('hud');
  const tl = document.getElementById('touchLeft');
  const tr = document.getElementById('touchRight');
  const gnot = document.getElementById('goalNotif');
  if (hud) { hud.style.width = Math.floor(W*scale)+'px'; hud.style.left = ((wr - W*scale)/2)+'px'; }
  if (tl) { tl.style.width = Math.floor(W*scale/2)+'px'; tl.style.left = ((wr - W*scale)/2)+'px'; tl.style.height = Math.floor(H*scale*0.35)+'px'; }
  if (tr) { tr.style.width = Math.floor(W*scale/2)+'px'; tr.style.right = ((wr - W*scale)/2)+'px'; tr.style.height = Math.floor(H*scale*0.35)+'px'; }
  if (gnot) { gnot.style.top = (Math.floor(H*scale*0.12) + (wh-H*scale)/2)+'px'; }
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ═══════════════════════════════════════════════════════════
// PLAYERS INIT
// ═══════════════════════════════════════════════════════════
function initPlayers(swap) {
  state.players = [];
  for (let i = 0; i < 5; i++) {
    const fx = swap ? 1 - FORM[i][0] : FORM[i][0];
    const fy = FORM[i][1];
    state.players.push({ team:0, idx:i, x: FX1 + fx * FW, y: FY1 + fy * FH, vx:0, vy:0 });
    const gx = swap ? FORM[i][0] : 1 - FORM[i][0];
    const gy = FORM[i][1];
    state.players.push({ team:1, idx:i, x: FX1 + gx * FW, y: FY1 + gy * FH, vx:0, vy:0 });
  }
}

function resetKickoff(scoringTeam) {
  state.ball.x = W/2; state.ball.y = H/2; state.ball.vx = 0; state.ball.vy = 0;
  initPlayers(state.sidesSwapped);
}

// ═══════════════════════════════════════════════════════════
// NEAREST PLAYER (for human control)
// ═══════════════════════════════════════════════════════════
function nearestPlayer(team) {
  let best = null, bd = 1e9;
  for (const p of state.players) {
    if (p.team !== team) continue;
    const dx = p.x - state.ball.x, dy = p.y - state.ball.y;
    const d = dx*dx + dy*dy;
    if (d < bd) { bd = d; best = p; }
  }
  return best;
}

// ═══════════════════════════════════════════════════════════
// PHYSICS (host only)
// ═══════════════════════════════════════════════════════════
function physicsStep(dt) {
  if (state.phase !== 'play') return;

  const inp = state.input;
  const hostPlayer = nearestPlayer(0);
  const guestPlayer = nearestPlayer(1);

  // Apply human input
  for (const p of state.players) {
    let dx = 0, dy = 0, kick = false;
    const isHuman = (p === hostPlayer && role === 'host') || (p === guestPlayer);
    if (p === hostPlayer) { dx = inp.h.dx; dy = inp.h.dy; kick = inp.h.kick; inp.h.kick = false; }
    if (p === guestPlayer) { dx = inp.g.dx; dy = inp.g.dy; kick = inp.g.kick; inp.g.kick = false; }

    if (isHuman) {
      p.vx = dx * PLAYER_SPEED;
      p.vy = dy * PLAYER_SPEED;
    } else {
      aiMove(p);
    }

    // Move
    p.x += p.vx;
    p.y += p.vy;
    // Field clamp
    p.x = Math.max(FX1 + PLAYER_R, Math.min(FX2 - PLAYER_R, p.x));
    p.y = Math.max(FY1 + PLAYER_R, Math.min(FY2 - PLAYER_R, p.y));

    // Kick
    if (kick) {
      const bdx = state.ball.x - p.x, bdy = state.ball.y - p.y;
      const bd = Math.sqrt(bdx*bdx + bdy*bdy);
      if (bd < PLAYER_R + BALL_R + 10) {
        let kx = bdx, ky = bdy;
        if (Math.abs(p.vx) > 0.1 || Math.abs(p.vy) > 0.1) { kx = p.vx; ky = p.vy; }
        const km = Math.sqrt(kx*kx + ky*ky) || 1;
        state.ball.vx = (kx / km) * KICK_POWER;
        state.ball.vy = (ky / km) * KICK_POWER;
      }
    }
  }

  // Ball physics
  const b = state.ball;
  b.vx *= BALL_FRICTION; b.vy *= BALL_FRICTION;
  b.x += b.vx; b.y += b.vy;

  // Wall bounce
  if (b.y < FY1 + BALL_R) { b.y = FY1 + BALL_R; b.vy = Math.abs(b.vy) * 0.75; }
  if (b.y > FY2 - BALL_R) { b.y = FY2 - BALL_R; b.vy = -Math.abs(b.vy) * 0.75; }
  // Left/right wall (only outside goal opening)
  if (b.x < FX1 + BALL_R) {
    if (b.y < GOAL_Y1 || b.y > GOAL_Y2) { b.x = FX1 + BALL_R; b.vx = Math.abs(b.vx) * 0.75; }
  }
  if (b.x > FX2 - BALL_R) {
    if (b.y < GOAL_Y1 || b.y > GOAL_Y2) { b.x = FX2 - BALL_R; b.vx = -Math.abs(b.vx) * 0.75; }
  }

  // Goal net bounce
  if (b.x < FX1 - GOAL_W + BALL_R) { b.x = FX1 - GOAL_W + BALL_R; b.vx = Math.abs(b.vx) * 0.6; }
  if (b.x > FX2 + GOAL_W - BALL_R) { b.x = FX2 + GOAL_W - BALL_R; b.vx = -Math.abs(b.vx) * 0.6; }

  // Player-ball collision
  for (const p of state.players) {
    const dx = b.x - p.x, dy = b.y - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const minDist = PLAYER_R + BALL_R;
    if (dist < minDist && dist > 0.01) {
      const nx = dx/dist, ny = dy/dist;
      const overlap = minDist - dist;
      b.x += nx * overlap;
      b.y += ny * overlap;
      const rel = b.vx*nx + b.vy*ny - (p.vx*nx + p.vy*ny);
      if (rel < 0) {
        b.vx -= 1.5 * rel * nx;
        b.vy -= 1.5 * rel * ny;
      }
    }
  }

  // Check goals
  if (state.goalCooldown > 0) { state.goalCooldown -= dt; return; }

  // Left goal (Barca's own goal → Madrid scores), or flipped
  let leftTeam = state.sidesSwapped ? 1 : 0;   // team defending left
  let rightTeam = state.sidesSwapped ? 0 : 1;

  if (b.x < FX1 - GOAL_W/2 && b.y > GOAL_Y1 && b.y < GOAL_Y2) {
    // scored in left goal → right team scores
    goal(rightTeam);
  } else if (b.x > FX2 + GOAL_W/2 && b.y > GOAL_Y1 && b.y < GOAL_Y2) {
    goal(leftTeam);
  }
}

function aiMove(p) {
  const b = state.ball;
  const goalX = p.team === 0
    ? (state.sidesSwapped ? BARCA_GOAL_X : MADRID_GOAL_X)
    : (state.sidesSwapped ? MADRID_GOAL_X : BARCA_GOAL_X);
  const ownGoalX = goalX === BARCA_GOAL_X ? MADRID_GOAL_X : BARCA_GOAL_X;
  const dx = b.x - p.x, dy = b.y - p.y;
  const d = Math.sqrt(dx*dx + dy*dy);
  let tx = p.x, ty = p.y;

  if (p.idx === 0) { // GK
    ty = b.y; tx = ownGoalX + (p.team === 0 ? (state.sidesSwapped ? -40 : 40) : (state.sidesSwapped ? 40 : -40));
    ty = Math.max(GOAL_Y1, Math.min(GOAL_Y2, ty));
  } else if (d < 180 || p.idx === 4) { // chase ball
    tx = b.x; ty = b.y;
    // auto-kick
    if (d < PLAYER_R + BALL_R + 8) {
      const toward = goalX - b.x;
      const km = Math.abs(toward) || 1;
      state.ball.vx = (toward/km) * KICK_POWER * 0.85;
      state.ball.vy = (b.y - H/2) * 0.04;
    }
  } else { // hold position
    const fi = FORM[p.idx];
    const fx = state.sidesSwapped
      ? (p.team === 0 ? fi[0] : 1 - fi[0])
      : (p.team === 0 ? 1 - fi[0] : fi[0]);
    tx = FX1 + fx * FW;
    ty = FY1 + fi[1] * FH;
  }

  const pdx = tx - p.x, pdy = ty - p.y;
  const pd = Math.sqrt(pdx*pdx + pdy*pdy);
  if (pd > 0.5) {
    p.vx = (pdx/pd) * PLAYER_SPEED * 0.8;
    p.vy = (pdy/pd) * PLAYER_SPEED * 0.8;
  } else { p.vx = 0; p.vy = 0; }
}

function goal(team) {
  state.score[team]++;
  state.lastGoalTeam = team;
  state.goalCooldown = GOAL_COOLDOWN;
  showGoalNotif(team);
  updateHUD();
  setTimeout(() => {
    resetKickoff(team);
    broadcastState();
  }, GOAL_COOLDOWN);
}

// ═══════════════════════════════════════════════════════════
// TIMER (host)
// ═══════════════════════════════════════════════════════════
let lastTick = null;
function updateTimer(now) {
  if (!lastTick) { lastTick = now; return; }
  const dt = (now - lastTick) / 1000;
  lastTick = now;
  if (state.phase !== 'play') return;
  if (state.goalCooldown > 0) return;
  state.time -= dt;
  if (state.time <= 0) {
    state.time = 0;
    if (state.half === 1) startHalftime();
    else startFulltime();
  }
}

function startHalftime() {
  state.phase = 'halftime';
  showScreen('screenHalftime');
  document.getElementById('htScoreA').textContent = state.score[0];
  document.getElementById('htScoreB').textContent = state.score[1];
  let cd = 5;
  const el = document.getElementById('htCountdown');
  el.textContent = `Jätkub ${cd} sekundi pärast…`;
  const iv = setInterval(() => {
    cd--;
    if (cd <= 0) {
      clearInterval(iv);
      state.half = 2;
      state.time = HALF_DUR;
      state.sidesSwapped = true;
      resetKickoff(-1);
      state.phase = 'play';
      showScreen(null);
      document.getElementById('halfLabel').textContent = '2. POOLAEG';
      broadcastState();
    } else {
      el.textContent = `Jätkub ${cd} sekundi pärast…`;
    }
  }, 1000);
}

function startFulltime() {
  state.phase = 'fulltime';
  showScreen('screenFulltime');
  document.getElementById('ftScoreA').textContent = state.score[0];
  document.getElementById('ftScoreB').textContent = state.score[1];
  const [a, b] = state.score;
  const wl = document.getElementById('ftWinnerLabel');
  const wn = document.getElementById('ftWinnerName');
  if (a > b) { wl.textContent = 'Võitja'; wn.textContent = 'FC BARCELONA 🔵🔴'; wn.style.color = 'var(--barca-gold)'; }
  else if (b > a) { wl.textContent = 'Võitja'; wn.textContent = 'REAL MADRID ⚪'; wn.style.color = 'var(--madrid-white)'; }
  else { wl.textContent = 'Tulemus'; wn.textContent = 'VIIK ⚖️'; wn.style.color = '#aaa'; }
  if (role === 'host') document.getElementById('btnRestart').style.display = 'block';
  broadcastState();
}

// ═══════════════════════════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════════════════════════
function drawScene() {
  ctx.clearRect(0, 0, W, H);
  drawStadium();
  drawField();
  drawGoals();
  drawPlayers();
  drawBall();
}

function drawStadium() {
  // Stands gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a1535');
  grad.addColorStop(1, '#060d20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // Crowd rows
  const rows = [
    {y:2, h:18, colors:['#004D98','#A50044','#004D98','#EDBB00']},
    {y:22, h:14, colors:['#A50044','#004D98','#EDBB00','#004D98']},
    {y:H-36, h:14, colors:['#004D98','#EDBB00','#A50044','#004D98']},
    {y:H-20, h:18, colors:['#EDBB00','#A50044','#004D98','#A50044']},
  ];
  for (const row of rows) {
    for (let x = 0; x < W; x += 18) {
      ctx.fillStyle = row.colors[Math.floor(x/18) % row.colors.length] + '88';
      ctx.fillRect(x, row.y, 17, row.h);
    }
  }
  // Left/right stands
  for (let y = 40; y < H-40; y += 16) {
    const colors = ['#004D98','#A50044','#EDBB00'];
    ctx.fillStyle = colors[Math.floor(y/16) % colors.length] + '66';
    ctx.fillRect(0, y, 56, 14);
    ctx.fillStyle = colors[(Math.floor(y/16)+1) % colors.length] + '66';
    ctx.fillRect(W-56, y, 56, 14);
  }
}

function drawField() {
  // Main green
  const ggrad = ctx.createLinearGradient(FX1, FY1, FX1, FY2);
  ggrad.addColorStop(0, '#2d7a2d');
  ggrad.addColorStop(0.5, '#337a33');
  ggrad.addColorStop(1, '#2d7a2d');
  ctx.fillStyle = ggrad;
  ctx.fillRect(FX1, FY1, FW, FH);

  // Stripe pattern
  for (let i = 0; i < 8; i++) {
    ctx.fillStyle = i%2===0 ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.03)';
    ctx.fillRect(FX1 + i * (FW/8), FY1, FW/8, FH);
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2;
  // Border
  ctx.strokeRect(FX1, FY1, FW, FH);
  // Center line
  ctx.beginPath(); ctx.moveTo(W/2, FY1); ctx.lineTo(W/2, FY2); ctx.stroke();
  // Center circle
  ctx.beginPath(); ctx.arc(W/2, H/2, 50, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2, H/2, 3, 0, Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fill();
  // Penalty areas
  const pa = 90, pb = 120;
  ctx.strokeRect(FX1, H/2 - pb/2, pa, pb);
  ctx.strokeRect(FX2 - pa, H/2 - pb/2, pa, pb);
  // Penalty spots
  ctx.beginPath(); ctx.arc(FX1 + 60, H/2, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(FX2 - 60, H/2, 3, 0, Math.PI*2); ctx.fill();
}

function drawGoals() {
  ctx.strokeStyle = 'rgba(255,255,255,0.95)';
  ctx.lineWidth = 3;
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  // Left goal (team depends on swap)
  ctx.beginPath();
  ctx.rect(FX1 - GOAL_W, GOAL_Y1, GOAL_W, GOAL_H);
  ctx.fill(); ctx.stroke();
  // Right goal
  ctx.beginPath();
  ctx.rect(FX2, GOAL_Y1, GOAL_W, GOAL_H);
  ctx.fill(); ctx.stroke();
  // Goal net lines
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  for (let y = GOAL_Y1 + 10; y < GOAL_Y2; y += 10) {
    ctx.beginPath(); ctx.moveTo(FX1 - GOAL_W, y); ctx.lineTo(FX1, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(FX2, y); ctx.lineTo(FX2 + GOAL_W, y); ctx.stroke();
  }
  for (let x = FX1 - GOAL_W + 10; x < FX1; x += 10) {
    ctx.beginPath(); ctx.moveTo(x, GOAL_Y1); ctx.lineTo(x, GOAL_Y2); ctx.stroke();
  }
  for (let x = FX2 + 10; x < FX2 + GOAL_W; x += 10) {
    ctx.beginPath(); ctx.moveTo(x, GOAL_Y1); ctx.lineTo(x, GOAL_Y2); ctx.stroke();
  }
  // Team labels
  ctx.font = 'bold 11px Oswald, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const leftTeam = state.sidesSwapped ? 1 : 0;
  const rightTeam = 1 - leftTeam;
  ctx.fillStyle = leftTeam === 0 ? '#004D98' : 'rgba(245,245,245,0.7)';
  ctx.fillText(leftTeam === 0 ? 'FCB' : 'RMA', FX1 - GOAL_W/2, GOAL_Y1 - 10);
  ctx.fillStyle = rightTeam === 0 ? '#004D98' : 'rgba(245,245,245,0.7)';
  ctx.fillText(rightTeam === 0 ? 'FCB' : 'RMA', FX2 + GOAL_W/2, GOAL_Y1 - 10);
}

function drawPlayers() {
  const humanH = nearestPlayer(0);
  const humanG = nearestPlayer(1);
  for (const p of state.players) {
    const isHuman = (p === humanH) || (p === humanG);
    drawPlayer(p, isHuman);
  }
}

function drawPlayer(p, isHuman) {
  ctx.save();
  ctx.translate(p.x, p.y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(2, 6, PLAYER_R*0.7, PLAYER_R*0.35, 0, 0, Math.PI*2); ctx.fill();

  // Glow for human-controlled
  if (isHuman) {
    ctx.shadowColor = p.team === 0 ? '#EDBB00' : '#EDBB00';
    ctx.shadowBlur = 14;
  }

  // Body
  if (p.team === 0) {
    // Barca: blue/red vertical stripes
    ctx.save();
    ctx.beginPath(); ctx.arc(0, 0, PLAYER_R, 0, Math.PI*2); ctx.clip();
    ctx.fillStyle = '#004D98';
    ctx.fillRect(-PLAYER_R, -PLAYER_R, PLAYER_R*2, PLAYER_R*2);
    for (let i = -2; i <= 2; i++) {
      if (i % 2 === 0) {
        ctx.fillStyle = '#A50044';
        ctx.fillRect(i * (PLAYER_R/2), -PLAYER_R, PLAYER_R/2, PLAYER_R*2);
      }
    }
    ctx.restore();
  } else {
    // Madrid: white with gold collar
    ctx.save();
    ctx.beginPath(); ctx.arc(0, 0, PLAYER_R, 0, Math.PI*2); ctx.clip();
    ctx.fillStyle = '#E8E8E8';
    ctx.fillRect(-PLAYER_R, -PLAYER_R, PLAYER_R*2, PLAYER_R*2);
    ctx.fillStyle = '#C0A040';
    ctx.fillRect(-PLAYER_R, -PLAYER_R, PLAYER_R*2, 6);
    ctx.restore();
  }

  // Outline
  ctx.strokeStyle = isHuman ? 'rgba(237,187,0,0.9)' : 'rgba(0,0,0,0.5)';
  ctx.lineWidth = isHuman ? 2.5 : 1.5;
  ctx.beginPath(); ctx.arc(0, 0, PLAYER_R, 0, Math.PI*2); ctx.stroke();

  // Number
  ctx.fillStyle = p.team === 0 ? '#fff' : '#222';
  ctx.font = `bold ${p.idx === 0 ? 11 : 10}px Rajdhani, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowBlur = 0;
  ctx.fillText(p.idx + 1, 0, 1);

  ctx.restore();
}

function drawBall() {
  const b = state.ball;
  ctx.save();
  ctx.translate(b.x, b.y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(2, 7, BALL_R*0.8, BALL_R*0.4, 0, 0, Math.PI*2); ctx.fill();

  // Ball body
  const bg = ctx.createRadialGradient(-BALL_R*0.3, -BALL_R*0.3, 1, 0, 0, BALL_R);
  bg.addColorStop(0, '#fff');
  bg.addColorStop(0.6, '#ddd');
  bg.addColorStop(1, '#aaa');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, 0, Math.PI*2); ctx.fill();

  // Pentagons pattern
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(0, 0, BALL_R*0.45, 0, Math.PI*2); ctx.stroke();
  for (let a = 0; a < Math.PI*2; a += Math.PI/3) {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a)*BALL_R*0.8, Math.sin(a)*BALL_R*0.8);
    ctx.stroke();
  }

  // Shine
  const sg = ctx.createRadialGradient(-BALL_R*0.3, -BALL_R*0.35, 0, -BALL_R*0.3, -BALL_R*0.35, BALL_R*0.5);
  sg.addColorStop(0, 'rgba(255,255,255,0.55)');
  sg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('scoreBarca').textContent = state.score[0];
  document.getElementById('scoreMadrid').textContent = state.score[1];
  const s = Math.ceil(state.time);
  const m = Math.floor(s / 60), sec = s % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${sec.toString().padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('hud').style.display = 'none';
  document.getElementById('touchLeft').style.display = 'none';
  document.getElementById('touchRight').style.display = 'none';
  if (id) {
    document.getElementById(id).classList.add('active');
  } else {
    document.getElementById('hud').style.display = 'flex';
    const isTouchDev = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    if (isTouchDev) {
      document.getElementById('touchLeft').style.display = 'flex';
      document.getElementById('touchRight').style.display = 'flex';
    }
  }
}

function showGoalNotif(team) {
  const el = document.getElementById('goalNotif');
  el.textContent = team === 0 ? '⚽ BARÇA VÄRAV!' : '⚽ MADRID VÄRAV!';
  el.style.background = team === 0
    ? 'linear-gradient(135deg,rgba(0,77,152,0.95),rgba(165,0,68,0.95))'
    : 'linear-gradient(135deg,rgba(200,160,50,0.95),rgba(180,140,30,0.95))';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════════════════
// NETWORK (PeerJS)
// ═══════════════════════════════════════════════════════════
function broadcastState() {
  if (conn && conn.open) {
    conn.send({ type:'state', state: serializeState() });
  }
}

function serializeState() {
  return {
    ball: { x: state.ball.x, y: state.ball.y, vx: state.ball.vx, vy: state.ball.vy },
    players: state.players.map(p => ({ team:p.team, idx:p.idx, x:p.x, y:p.y })),
    score: [...state.score],
    half: state.half,
    time: state.time,
    phase: state.phase,
    sidesSwapped: state.sidesSwapped,
    lastGoalTeam: state.lastGoalTeam,
  };
}

function applyState(s) {
  state.ball.x = s.ball.x; state.ball.y = s.ball.y;
  state.ball.vx = s.ball.vx; state.ball.vy = s.ball.vy;
  state.players = s.players.map(p => ({ ...p, vx:0, vy:0 }));
  const prevScore = [...state.score];
  state.score = s.score;
  state.half = s.half;
  state.time = s.time;
  state.sidesSwapped = s.sidesSwapped;
  // Check goal for guest side
  if (s.lastGoalTeam !== state.lastGoalTeam && s.lastGoalTeam >= 0) {
    state.lastGoalTeam = s.lastGoalTeam;
    showGoalNotif(s.lastGoalTeam);
  }
  if (s.phase !== state.phase) {
    state.phase = s.phase;
    if (s.phase === 'halftime') {
      showScreen('screenHalftime');
      document.getElementById('htScoreA').textContent = s.score[0];
      document.getElementById('htScoreB').textContent = s.score[1];
    } else if (s.phase === 'fulltime') {
      showScreen('screenFulltime');
      document.getElementById('ftScoreA').textContent = s.score[0];
      document.getElementById('ftScoreB').textContent = s.score[1];
      const [a,b] = s.score;
      const wl = document.getElementById('ftWinnerLabel');
      const wn = document.getElementById('ftWinnerName');
      if (a > b) { wl.textContent='Võitja'; wn.textContent='FC BARCELONA 🔵🔴'; wn.style.color='var(--barca-gold)'; }
      else if (b > a) { wl.textContent='Võitja'; wn.textContent='REAL MADRID ⚪'; wn.style.color='var(--madrid-white)'; }
      else { wl.textContent='Tulemus'; wn.textContent='VIIK ⚖️'; wn.style.color='#aaa'; }
    } else if (s.phase === 'play') {
      showScreen(null);
      document.getElementById('halfLabel').textContent = s.half === 1 ? '1. POOLAEG' : '2. POOLAEG';
    }
  }
  updateHUD();
}

// ═══════════════════════════════════════════════════════════
// HOST SETUP
// ═══════════════════════════════════════════════════════════
function startHost() {
  showScreen('screenWaiting');
  const code = String(Math.floor(100000 + Math.random() * 900000));
  document.getElementById('codeDisplay').textContent = code;

  peer = new Peer('laclasica-' + code, { debug: 0 });
  peer.on('open', () => {
    document.getElementById('statusMsg').innerHTML = '<span class="status-dot"></span>Ootan ühendust…';
  });
  peer.on('connection', (c) => {
    conn = c;
    c.on('open', () => {
      document.getElementById('statusMsg').innerHTML = '<span class="status-dot" style="background:#00e676"></span>Ühendatud! Mäng algab…';
      setTimeout(() => {
        startGame();
        broadcastState();
      }, 800);
    });
    c.on('data', (data) => {
      if (data.type === 'input') {
        state.input.g.dx = data.dx;
        state.input.g.dy = data.dy;
        if (data.kick) state.input.g.kick = true;
      }
    });
    c.on('close', () => { document.getElementById('statusMsg').textContent = 'Ühendus katkes.'; });
  });
  peer.on('error', (e) => { document.getElementById('statusMsg').textContent = 'Viga: ' + e.type; });
}

// ═══════════════════════════════════════════════════════════
// GUEST SETUP
// ═══════════════════════════════════════════════════════════
function startGuest(code) {
  peer = new Peer({ debug: 0 });
  peer.on('open', () => {
    conn = peer.connect('laclasica-' + code, { reliable: true });
    conn.on('open', () => {
      document.getElementById('errorMsg').textContent = '';
    });
    conn.on('data', (data) => {
      if (data.type === 'state') applyState(data.state);
    });
    conn.on('close', () => {});
  });
  peer.on('error', (e) => {
    document.getElementById('errorMsg').textContent = 'Ei leia mängu. Kontrolli koodi.';
  });
}

function sendInput() {
  if (conn && conn.open) {
    conn.send({ type:'input', dx: state.input.h.dx, dy: state.input.h.dy, kick: state.input.h.kick });
    state.input.h.kick = false;
  }
}

// ═══════════════════════════════════════════════════════════
// GAME START
// ═══════════════════════════════════════════════════════════
function startGame() {
  role = role || 'host';
  state.half = 1; state.time = HALF_DUR;
  state.score = [0,0]; state.phase = 'play';
  state.sidesSwapped = false; state.lastGoalTeam = -1;
  state.goalCooldown = 0;
  initPlayers(false);
  showScreen(null);
  document.getElementById('halfLabel').textContent = '1. POOLAEG';
  updateHUD();
  lastTick = null;
}

// ═══════════════════════════════════════════════════════════
// INPUT: KEYBOARD
// ═══════════════════════════════════════════════════════════
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; if(e.key===' '||e.key==='Enter') { e.preventDefault(); } });
window.addEventListener('keyup', e => { keys[e.key] = false; });

function readKeyboardInput() {
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  const kick = keys[' '] || keys['Enter'];
  if (kick && !state.input.h.kick) state.input.h.kick = true;
  const inpTarget = (role === 'guest') ? state.input.h : state.input.h;
  inpTarget.dx = dx; inpTarget.dy = dy;
}

// ═══════════════════════════════════════════════════════════
// INPUT: TOUCH JOYSTICK
// ═══════════════════════════════════════════════════════════
const joystickWrap = document.getElementById('joystickWrap');
const joystickKnob = document.getElementById('joystickKnob');
const kickBtn = document.getElementById('kickBtn');
let joyActive = false, joyId = null, joyBase = { x:0, y:0 };
const JOY_R = 32;

joystickWrap.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const r = joystickWrap.getBoundingClientRect();
  joyBase = { x: r.left + r.width/2, y: r.top + r.height/2 };
  joyId = t.identifier; joyActive = true;
}, {passive:false});

document.addEventListener('touchmove', e => {
  if (!joyActive) return;
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (t.identifier !== joyId) continue;
    let dx = t.clientX - joyBase.x;
    let dy = t.clientY - joyBase.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > JOY_R) { dx = dx/dist*JOY_R; dy = dy/dist*JOY_R; }
    joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    state.input.h.dx = dx / JOY_R;
    state.input.h.dy = dy / JOY_R;
  }
}, {passive:false});

document.addEventListener('touchend', e => {
  for (let i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === joyId) {
      joyActive = false; joyId = null;
      joystickKnob.style.transform = 'translate(-50%, -50%)';
      state.input.h.dx = 0; state.input.h.dy = 0;
    }
  }
});

kickBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  state.input.h.kick = true;
  kickBtn.classList.add('pressed');
}, {passive:false});
kickBtn.addEventListener('touchend', () => kickBtn.classList.remove('pressed'));
kickBtn.addEventListener('mousedown', () => { state.input.h.kick = true; kickBtn.classList.add('pressed'); });
kickBtn.addEventListener('mouseup', () => kickBtn.classList.remove('pressed'));

// ═══════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════
let frameCount = 0;
function loop(now) {
  requestAnimationFrame(loop);
  if (state.phase === 'play' || state.phase === 'goal') {
    readKeyboardInput();
    if (role === 'host') {
      updateTimer(now);
      physicsStep(now);
      updateHUD();
      frameCount++;
      if (frameCount % 2 === 0) broadcastState();
    } else if (role === 'guest') {
      // Send input at ~30fps
      frameCount++;
      if (frameCount % 2 === 0) sendInput();
    }
    drawScene();
  } else if (state.phase === 'halftime' || state.phase === 'fulltime') {
    drawScene();
  }
}
requestAnimationFrame(loop);

// ═══════════════════════════════════════════════════════════
// BUTTON HANDLERS
// ═══════════════════════════════════════════════════════════
document.getElementById('btnHost').addEventListener('click', () => {
  role = 'host';
  startHost();
});

document.getElementById('btnJoin').addEventListener('click', () => {
  const code = document.getElementById('inputCode').value.trim();
  if (code.length !== 6 || isNaN(code)) {
    document.getElementById('errorMsg').textContent = 'Sisesta 6-kohaline kood';
    return;
  }
  role = 'guest';
  showScreen('screenWaiting');
  document.getElementById('codeDisplay').textContent = code;
  document.getElementById('statusMsg').innerHTML = '<span class="status-dot"></span>Ühendan…';
  startGuest(code);
});

document.getElementById('btnCopyCode').addEventListener('click', () => {
  const code = document.getElementById('codeDisplay').textContent;
  navigator.clipboard?.writeText(code).then(() => {
    document.getElementById('btnCopyCode').textContent = '✓ Kopeeritud!';
    setTimeout(() => document.getElementById('btnCopyCode').textContent = 'Kopeeri kood', 2000);
  });
});

document.getElementById('inputCode').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnJoin').click();
});

document.getElementById('btnRestart')?.addEventListener('click', () => {
  state.score = [0,0]; state.half = 1; state.time = HALF_DUR;
  state.sidesSwapped = false; state.lastGoalTeam = -1; state.goalCooldown = 0;
  initPlayers(false);
  state.phase = 'play';
  showScreen(null);
  document.getElementById('halfLabel').textContent = '1. POOLAEG';
  updateHUD();
  broadcastState();
});
