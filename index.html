<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>La Clásica – Barcelona vs Real Madrid</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root{--barca-blue:#004D98;--barca-red:#A50044;--barca-gold:#EDBB00;--madrid-white:#F5F5F5;--madrid-gold:#C0A040;}
  *{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;}
  #gameWrapper{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0d1526 0%,#050810 100%);}
  canvas{display:block;}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:linear-gradient(180deg,rgba(0,0,0,.88) 0%,rgba(0,0,0,0) 100%);pointer-events:none;z-index:10;}
  #hud .team{display:flex;align-items:center;gap:8px;}
  #hud .badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;font-family:'Oswald',sans-serif;}
  #hud .badge.barca{background:linear-gradient(135deg,var(--barca-blue) 50%,var(--barca-red) 50%);}
  #hud .badge.madrid{background:linear-gradient(135deg,var(--madrid-gold) 30%,var(--madrid-white) 30%);color:#333;}
  #hud .score{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:2px;text-shadow:0 0 12px rgba(237,187,0,.7);}
  #hud .timer-wrap{text-align:center;}
  #hud .timer{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;color:var(--barca-gold);letter-spacing:1px;}
  #hud .half-label{font-size:10px;color:rgba(255,255,255,.5);text-align:center;letter-spacing:2px;text-transform:uppercase;}
  .screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#0d1a35 0%,#050810 100%);z-index:100;}
  .screen.active{display:flex;}
  .screen-logo{font-family:'Oswald',sans-serif;font-size:clamp(18px,5vw,36px);font-weight:700;letter-spacing:4px;color:var(--barca-gold);text-shadow:0 0 30px rgba(237,187,0,.5);margin-bottom:4px;}
  .screen-sub{font-family:'Rajdhani',sans-serif;font-size:clamp(12px,3vw,16px);color:rgba(255,255,255,.5);letter-spacing:3px;text-transform:uppercase;margin-bottom:30px;}
  .card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:24px 32px;width:min(90vw,360px);display:flex;flex-direction:column;gap:14px;backdrop-filter:blur(8px);}
  .btn{font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;letter-spacing:2px;border:none;border-radius:8px;padding:13px 24px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
  .btn-primary{background:linear-gradient(135deg,var(--barca-blue),#0062be);color:#fff;box-shadow:0 4px 20px rgba(0,77,152,.4);}
  .btn-primary:active{transform:scale(.97);}
  .btn-secondary{background:linear-gradient(135deg,var(--barca-red),#c8004f);color:#fff;box-shadow:0 4px 20px rgba(165,0,68,.4);}
  .btn-secondary:active{transform:scale(.97);}
  .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);}
  .input-field{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;letter-spacing:4px;padding:12px 16px;text-align:center;width:100%;outline:none;transition:border .2s;}
  .input-field:focus{border-color:var(--barca-gold);}
  .input-field::placeholder{color:rgba(255,255,255,.25);font-size:14px;letter-spacing:2px;}
  .divider{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.25);font-size:12px;letter-spacing:2px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}
  #codeDisplay{font-family:'Oswald',sans-serif;font-size:36px;font-weight:700;letter-spacing:8px;color:var(--barca-gold);text-align:center;text-shadow:0 0 20px rgba(237,187,0,.4);}
  .code-label{font-size:11px;color:rgba(255,255,255,.4);text-align:center;letter-spacing:3px;text-transform:uppercase;}
  .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--barca-gold);margin-right:8px;animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
  #statusMsg{color:rgba(255,255,255,.6);font-size:14px;text-align:center;letter-spacing:1px;}
  #errorMsg{color:#ff4d6d;font-size:13px;text-align:center;min-height:18px;}
  .ht-title{font-family:'Oswald',sans-serif;font-size:clamp(24px,8vw,56px);font-weight:700;color:#fff;letter-spacing:4px;text-transform:uppercase;text-align:center;text-shadow:0 0 40px rgba(237,187,0,.5);margin-bottom:8px;}
  .ht-score{font-family:'Oswald',sans-serif;font-size:clamp(40px,12vw,88px);font-weight:700;color:var(--barca-gold);letter-spacing:8px;text-shadow:0 0 40px rgba(237,187,0,.6);margin-bottom:20px;}
  .ht-teams{display:flex;gap:32px;align-items:center;font-family:'Oswald',sans-serif;font-size:clamp(12px,3.5vw,20px);font-weight:600;letter-spacing:3px;color:rgba(255,255,255,.7);margin-bottom:24px;}
  .ht-teams .sep{color:var(--barca-gold);}
  .ht-countdown{font-family:'Oswald',sans-serif;font-size:clamp(14px,4vw,22px);color:rgba(255,255,255,.45);letter-spacing:2px;margin-top:8px;}
  .winner-label{font-family:'Rajdhani',sans-serif;font-size:clamp(13px,3.5vw,18px);letter-spacing:3px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:6px;}
  .winner-name{font-family:'Oswald',sans-serif;font-size:clamp(22px,7vw,44px);font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--barca-gold);text-shadow:0 0 30px rgba(237,187,0,.6);}
  #goalNotif{position:absolute;top:60px;left:50%;transform:translateX(-50%) scale(0);color:#fff;font-family:'Oswald',sans-serif;font-size:clamp(16px,5vw,26px);font-weight:700;letter-spacing:3px;padding:10px 28px;border-radius:50px;box-shadow:0 6px 30px rgba(0,0,0,.4);pointer-events:none;white-space:nowrap;transition:transform .25s cubic-bezier(.34,1.56,.64,1);z-index:200;}
  #goalNotif.show{transform:translateX(-50%) scale(1);}
  #touchControls{position:absolute;bottom:0;left:0;right:0;display:none;height:140px;pointer-events:none;z-index:50;}
  #touchControls.visible{display:flex;}
  #touchLeft{position:absolute;left:16px;bottom:20px;pointer-events:all;}
  #touchRight{position:absolute;right:16px;bottom:20px;display:flex;flex-direction:column;gap:10px;align-items:flex-end;pointer-events:all;}
  #joystickWrap{position:relative;width:110px;height:110px;}
  #joystickBase{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);}
  #joystickKnob{position:absolute;width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.35),rgba(255,255,255,.12));border:2px solid rgba(255,255,255,.3);top:50%;left:50%;transform:translate(-50%,-50%);}
  .abtn{display:flex;align-items:center;justify-content:center;border-radius:50%;font-family:'Oswald',sans-serif;font-weight:700;color:#fff;cursor:pointer;border:3px solid transparent;transition:transform .1s,opacity .1s;}
  .abtn:active,.abtn.pressed{transform:scale(.88);opacity:.8;}
  #kickBtn{width:74px;height:74px;font-size:13px;letter-spacing:1px;background:radial-gradient(circle at 35% 35%,#A50044,#6a002b);border-color:rgba(255,100,100,.4);box-shadow:0 4px 20px rgba(165,0,68,.6);}
  #passBtn{width:60px;height:60px;font-size:12px;letter-spacing:1px;background:radial-gradient(circle at 35% 35%,#004D98,#002d5c);border-color:rgba(100,160,255,.4);box-shadow:0 4px 16px rgba(0,77,152,.6);}
  #rotatePrompt{display:none;position:fixed;inset:0;z-index:999;background:#000;flex-direction:column;align-items:center;justify-content:center;gap:20px;color:#fff;}
  #rotatePrompt p{font-family:'Oswald',sans-serif;font-size:20px;letter-spacing:3px;color:rgba(255,255,255,.7);}
  @media (orientation:portrait) and (max-width:600px){#rotatePrompt{display:flex;}}
</style>
</head>
<body>
<div id="rotatePrompt"><svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#EDBB00" stroke-width="1.5" style="animation:rott 2s linear infinite"><style>@keyframes rott{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="18" r="1"/></svg><p>PÖÖRA TELEFON KÜLILI</p></div>

<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>

  <div id="hud" style="display:none;">
    <div class="team"><div class="badge barca">FCB</div><span class="score" id="scoreBarca">0</span></div>
    <div class="timer-wrap"><div class="half-label" id="halfLabel">1. POOLAEG</div><div class="timer" id="timerDisplay">2:00</div></div>
    <div class="team"><span class="score" id="scoreMadrid">0</span><div class="badge madrid">RMA</div></div>
  </div>

  <div id="touchControls">
    <div id="touchLeft"><div id="joystickWrap"><div id="joystickBase"></div><div id="joystickKnob"></div></div></div>
    <div id="touchRight"><div class="abtn" id="kickBtn">LÖÖK</div><div class="abtn" id="passBtn">SÖÖT</div></div>
  </div>

  <div id="goalNotif">⚽ VÄRAV!</div>

  <div class="screen active" id="screenLobby">
    <div class="screen-logo">⚽ LA CLÁSICA</div>
    <div class="screen-sub">Barcelona · Real Madrid</div>
    <div class="card">
      <button class="btn btn-primary" id="btnHost">MÄNGI BARCELONA 🔵🔴</button>
      <div class="divider">VÕI</div>
      <input class="input-field" id="inputCode" maxlength="6" placeholder="Sisesta kood" type="tel" inputmode="numeric">
      <button class="btn btn-secondary" id="btnJoin">LIITU REAL MADRID ⚪</button>
      <div id="errorMsg"></div>
    </div>
  </div>

  <div class="screen" id="screenWaiting">
    <div class="screen-logo">⚽ LA CLÁSICA</div>
    <div class="screen-sub" id="waitSubtitle">Oota vastast</div>
    <div class="card">
      <div class="code-label" id="codeLabel">Jaga seda koodi sõbrale</div>
      <div id="codeDisplay">· · · · · ·</div>
      <button class="btn btn-ghost" id="btnCopyCode">Kopeeri kood</button>
      <div id="statusMsg"><span class="status-dot"></span>Ootan…</div>
    </div>
  </div>

  <div class="screen" id="screenHalftime">
    <div class="ht-title">Vaheaeg</div>
    <div class="ht-teams"><span>FC BARCELONA</span><span class="sep">·</span><span>REAL MADRID</span></div>
    <div class="ht-score"><span id="htA">0</span> : <span id="htB">0</span></div>
    <div class="ht-countdown" id="htCd">Jätkub 5 sekundi pärast…</div>
  </div>

  <div class="screen" id="screenFulltime">
    <div class="ht-title">Mäng läbi!</div>
    <div class="ht-teams"><span>FC BARCELONA</span><span class="sep">·</span><span>REAL MADRID</span></div>
    <div class="ht-score"><span id="ftA">0</span> : <span id="ftB">0</span></div>
    <div class="winner-label" id="ftWL">Võitja</div>
    <div class="winner-name" id="ftWN">—</div>
    <div style="margin-top:28px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center;">
      <button class="btn btn-primary" id="btnRestart" style="display:none;">Uus mäng</button>
      <button class="btn btn-ghost" onclick="location.reload()">Tagasi menüüsse</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────
const W=800,H=480,HALF_DUR=120,GOAL_COOLDOWN=2500;
const PS=3.0,BF=0.982,KP=9.5,PP=6.0,PR=13,BR=9;
const FX1=60,FX2=W-60,FY1=50,FY2=H-50,FW=FX2-FX1,FH=FY2-FY1;
const GW=14,GH=80,GY1=H/2-GH/2,GY2=H/2+GH/2;
const FORM=[[.06,.5],[.24,.28],[.24,.72],[.50,.5],[.72,.5]];

// ── CANVAS ─────────────────────────────────
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
function resize(){
  const vw=innerWidth,vh=innerHeight,sc=Math.min(vw/W,vh/H);
  const cw=Math.floor(W*sc),ch=Math.floor(H*sc),ox=Math.floor((vw-cw)/2),oy=Math.floor((vh-ch)/2);
  canvas.width=W;canvas.height=H;canvas.style.width=cw+'px';canvas.style.height=ch+'px';
  const hud=document.getElementById('hud'),tc=document.getElementById('touchControls'),gn=document.getElementById('goalNotif');
  if(hud){hud.style.width=cw+'px';hud.style.left=ox+'px';hud.style.top=oy+'px';}
  if(tc){tc.style.width=cw+'px';tc.style.left=ox+'px';tc.style.bottom=oy+'px';}
  if(gn){gn.style.top=(oy+Math.floor(ch*.12))+'px';}
}
addEventListener('resize',resize);resize();

// ── STATE ──────────────────────────────────
let role=null,peer=null,conn=null,gameEverStarted=false;
const S={ball:{x:W/2,y:H/2,vx:0,vy:0},players:[],score:[0,0],half:1,time:HALF_DUR,
  phase:'lobby',// FIX: 'lobby' not 'play' so applyState detects phase change on first receive
  goalCooldown:0,sidesSwapped:false,lastGoalSeq:0,lastGoalTeam:-1};
const LI={dx:0,dy:0,kick:false,pass:false}; // local input
const GI={dx:0,dy:0,kick:false,pass:false}; // guest input (host side)

// ── PLAYERS ────────────────────────────────
function initPlayers(swap){
  S.players=[];
  for(let i=0;i<5;i++){
    const bx=swap?(1-FORM[i][0]):FORM[i][0],mx=swap?FORM[i][0]:(1-FORM[i][0]),fy=FORM[i][1];
    S.players.push({team:0,idx:i,x:FX1+bx*FW,y:FY1+fy*FH,vx:0,vy:0});
    S.players.push({team:1,idx:i,x:FX1+mx*FW,y:FY1+fy*FH,vx:0,vy:0});
  }
}
function resetKickoff(){S.ball={x:W/2,y:H/2,vx:0,vy:0};initPlayers(S.sidesSwapped);S.goalCooldown=0;}
function nearestToBall(team){let b=null,bd=1e9;for(const p of S.players){if(p.team!==team)continue;const d=(p.x-S.ball.x)**2+(p.y-S.ball.y)**2;if(d<bd){bd=d;b=p;}}return b;}

// ── AI ─────────────────────────────────────
function aiMove(p){
  const b=S.ball,atR=(p.team===0&&!S.sidesSwapped)||(p.team===1&&S.sidesSwapped);
  const oGX=atR?FX2:FX1,myGX=atR?FX1:FX2;
  const dx=b.x-p.x,dy=b.y-p.y,d=Math.hypot(dx,dy);
  let tx=p.x,ty=p.y;
  if(p.idx===0){tx=myGX+(atR?35:-35);ty=Math.max(GY1+PR,Math.min(GY2-PR,b.y));}
  else if(d<160||(p.idx===4&&d<280)){
    tx=b.x;ty=b.y;
    if(d<PR+BR+10){const dir=oGX-b.x,dm=Math.abs(dir)||1;S.ball.vx=(dir/dm)*KP*.75;S.ball.vy=(b.y-H/2)*.05;}
  } else {
    const fi=FORM[p.idx],nx=atR?fi[0]:(1-fi[0]);tx=FX1+nx*FW;ty=FY1+fi[1]*FH;
  }
  const pdx=tx-p.x,pdy=ty-p.y,pd=Math.hypot(pdx,pdy);
  if(pd>.5){p.vx=pdx/pd*PS*.75;p.vy=pdy/pd*PS*.75;}else{p.vx=0;p.vy=0;}
}

// ── PHYSICS (host) ─────────────────────────
function physicsStep(){
  if(S.phase!=='play')return;
  const HC=nearestToBall(0),GC=nearestToBall(1); // host-controlled, guest-controlled
  for(const p of S.players){
    if(p===HC){
      // FIX: strictly use human input, no AI
      p.vx=LI.dx*PS;p.vy=LI.dy*PS;
      if(LI.kick){doKick(p);LI.kick=false;}
      if(LI.pass){doPass(p,0);LI.pass=false;}
    } else if(p===GC){
      p.vx=GI.dx*PS;p.vy=GI.dy*PS;
      if(GI.kick){doKick(p);GI.kick=false;}
      if(GI.pass){doPass(p,1);GI.pass=false;}
    } else {aiMove(p);}
    p.x+=p.vx;p.y+=p.vy;
    p.x=Math.max(FX1+PR,Math.min(FX2-PR,p.x));
    p.y=Math.max(FY1+PR,Math.min(FY2-PR,p.y));
  }
  const b=S.ball;
  b.vx*=BF;b.vy*=BF;b.x+=b.vx;b.y+=b.vy;
  if(b.y<FY1+BR){b.y=FY1+BR;b.vy=Math.abs(b.vy)*.75;}
  if(b.y>FY2-BR){b.y=FY2-BR;b.vy=-Math.abs(b.vy)*.75;}
  if(b.x<FX1+BR&&(b.y<GY1||b.y>GY2)){b.x=FX1+BR;b.vx=Math.abs(b.vx)*.75;}
  if(b.x>FX2-BR&&(b.y<GY1||b.y>GY2)){b.x=FX2-BR;b.vx=-Math.abs(b.vx)*.75;}
  if(b.x<FX1-GW+BR){b.x=FX1-GW+BR;b.vx=Math.abs(b.vx)*.5;}
  if(b.x>FX2+GW-BR){b.x=FX2+GW-BR;b.vx=-Math.abs(b.vx)*.5;}
  for(const p of S.players){
    const dx=b.x-p.x,dy=b.y-p.y,dist=Math.hypot(dx,dy),mn=PR+BR;
    if(dist<mn&&dist>.01){const nx=dx/dist,ny=dy/dist;b.x+=nx*(mn-dist);b.y+=ny*(mn-dist);const r=(b.vx-p.vx)*nx+(b.vy-p.vy)*ny;if(r<0){b.vx-=1.6*r*nx;b.vy-=1.6*r*ny;}}
  }
  if(S.goalCooldown>0){S.goalCooldown-=16;return;}
  const LD=S.sidesSwapped?1:0,RD=1-LD;
  if(b.x<FX1-GW/2&&b.y>GY1&&b.y<GY2)goal(1-LD);
  else if(b.x>FX2+GW/2&&b.y>GY1&&b.y<GY2)goal(1-RD);
}
function doKick(p){
  const b=S.ball,dx=b.x-p.x,dy=b.y-p.y,d=Math.hypot(dx,dy);
  if(d>PR+BR+14)return;
  let kx=Math.abs(p.vx)>.2||Math.abs(p.vy)>.2?p.vx:dx,ky=Math.abs(p.vx)>.2||Math.abs(p.vy)>.2?p.vy:dy;
  const km=Math.hypot(kx,ky)||1;b.vx=kx/km*KP;b.vy=ky/km*KP;
}
function doPass(p,team){
  const b=S.ball,dx=b.x-p.x,dy=b.y-p.y;
  if(Math.hypot(dx,dy)>PR+BR+14)return;
  let best=null,bd=1e9;
  for(const t of S.players){if(t.team!==team||t===p)continue;const d=(t.x-p.x)**2+(t.y-p.y)**2;if(d<bd){bd=d;best=t;}}
  if(!best)return;
  const tx=best.x-b.x,ty=best.y-b.y,tm=Math.hypot(tx,ty)||1;b.vx=tx/tm*PP;b.vy=ty/tm*PP;
}
function goal(team){
  S.score[team]++;S.lastGoalTeam=team;S.lastGoalSeq++;S.goalCooldown=GOAL_COOLDOWN;
  showGoalNotif(team);updateHUD();
  setTimeout(()=>{resetKickoff();broadcast();},GOAL_COOLDOWN);
}

// ── TIMER (host) ───────────────────────────
let lastTick=null;
function tickTimer(now){
  if(!lastTick){lastTick=now;return;}
  if(S.phase!=='play'||S.goalCooldown>0){lastTick=now;return;}
  S.time-=(now-lastTick)/1000;lastTick=now;
  if(S.time<=0){S.time=0;S.half===1?startHalftime():startFulltime();}
}
function startHalftime(){
  S.phase='halftime';
  document.getElementById('htA').textContent=S.score[0];
  document.getElementById('htB').textContent=S.score[1];
  showScreen('screenHalftime');broadcast();
  let cd=5;const el=document.getElementById('htCd');el.textContent=`Jätkub ${cd} sekundi pärast…`;
  const iv=setInterval(()=>{cd--;if(cd<=0){clearInterval(iv);S.half=2;S.time=HALF_DUR;S.sidesSwapped=true;resetKickoff();S.phase='play';lastTick=null;showScreen(null);document.getElementById('halfLabel').textContent='2. POOLAEG';broadcast();}else el.textContent=`Jätkub ${cd} sekundi pärast…`;},1000);
}
function startFulltime(){S.phase='fulltime';showScreen('screenFulltime');renderFT();broadcast();}
function renderFT(){
  document.getElementById('ftA').textContent=S.score[0];document.getElementById('ftB').textContent=S.score[1];
  const [a,b]=S.score,wl=document.getElementById('ftWL'),wn=document.getElementById('ftWN');
  if(a>b){wl.textContent='Võitja';wn.textContent='FC BARCELONA 🔵🔴';wn.style.color='var(--barca-gold)';}
  else if(b>a){wl.textContent='Võitja';wn.textContent='REAL MADRID ⚪';wn.style.color='var(--madrid-white)';}
  else{wl.textContent='Tulemus';wn.textContent='VIIK ⚖️';wn.style.color='#aaa';}
  if(role==='host')document.getElementById('btnRestart').style.display='block';
}

// ── DRAW ───────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  // Stadium bg
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0a1535');g.addColorStop(1,'#060d20');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const rows=[{y:2,h:18,c:['#004D98','#A50044','#004D98','#EDBB00']},{y:22,h:12,c:['#A50044','#004D98','#EDBB00','#004D98']},{y:H-34,h:12,c:['#004D98','#EDBB00','#A50044','#004D98']},{y:H-20,h:18,c:['#EDBB00','#A50044','#004D98','#A50044']}];
  for(const r of rows)for(let x=0;x<W;x+=18){ctx.fillStyle=r.c[Math.floor(x/18)%r.c.length]+'88';ctx.fillRect(x,r.y,17,r.h);}
  for(let y=40;y<H-40;y+=16){const c=['#004D98','#A50044','#EDBB00'];ctx.fillStyle=c[Math.floor(y/16)%c.length]+'60';ctx.fillRect(0,y,56,14);ctx.fillStyle=c[(Math.floor(y/16)+1)%c.length]+'60';ctx.fillRect(W-56,y,56,14);}
  // Field
  const fg=ctx.createLinearGradient(FX1,FY1,FX1,FY2);fg.addColorStop(0,'#2d7a2d');fg.addColorStop(.5,'#347a34');fg.addColorStop(1,'#2d7a2d');ctx.fillStyle=fg;ctx.fillRect(FX1,FY1,FW,FH);
  for(let i=0;i<8;i++){ctx.fillStyle=i%2===0?'rgba(0,0,0,.04)':'rgba(255,255,255,.03)';ctx.fillRect(FX1+i*(FW/8),FY1,FW/8,FH);}
  ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=2;ctx.strokeRect(FX1,FY1,FW,FH);
  ctx.beginPath();ctx.moveTo(W/2,FY1);ctx.lineTo(W/2,FY2);ctx.stroke();
  ctx.beginPath();ctx.arc(W/2,H/2,50,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W/2,H/2,3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.9)';ctx.fill();
  ctx.strokeRect(FX1,H/2-60,85,120);ctx.strokeRect(FX2-85,H/2-60,85,120);
  ctx.beginPath();ctx.arc(FX1+58,H/2,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(FX2-58,H/2,3,0,Math.PI*2);ctx.fill();
  // Goals
  ctx.lineWidth=3;ctx.strokeStyle='rgba(255,255,255,.95)';ctx.fillStyle='rgba(255,255,255,.06)';
  ctx.beginPath();ctx.rect(FX1-GW,GY1,GW,GH);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.rect(FX2,GY1,GW,GH);ctx.fill();ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=.8;
  for(let y=GY1+10;y<GY2;y+=10){ctx.beginPath();ctx.moveTo(FX1-GW,y);ctx.lineTo(FX1,y);ctx.stroke();ctx.beginPath();ctx.moveTo(FX2,y);ctx.lineTo(FX2+GW,y);ctx.stroke();}
  for(let x=FX1-GW+8;x<FX1;x+=8){ctx.beginPath();ctx.moveTo(x,GY1);ctx.lineTo(x,GY2);ctx.stroke();}
  for(let x=FX2+8;x<FX2+GW;x+=8){ctx.beginPath();ctx.moveTo(x,GY1);ctx.lineTo(x,GY2);ctx.stroke();}
  ctx.font='bold 11px Oswald,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  const LT=S.sidesSwapped?1:0,RT=1-LT;
  ctx.fillStyle=LT===0?'#004D98':'rgba(245,245,245,.7)';ctx.fillText(LT===0?'FCB':'RMA',FX1-GW/2,GY1-9);
  ctx.fillStyle=RT===0?'#004D98':'rgba(245,245,245,.7)';ctx.fillText(RT===0?'FCB':'RMA',FX2+GW/2,GY1-9);
  // Players
  const HC=nearestToBall(0),GC=nearestToBall(1);
  for(const p of S.players)drawPlayer(p,p===HC||p===GC);
  // Ball
  const b=S.ball;ctx.save();ctx.translate(b.x,b.y);
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(2,7,BR*.8,BR*.4,0,0,Math.PI*2);ctx.fill();
  const bg=ctx.createRadialGradient(-BR*.3,-BR*.3,1,0,0,BR);bg.addColorStop(0,'#fff');bg.addColorStop(.6,'#ddd');bg.addColorStop(1,'#999');
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#222';ctx.lineWidth=.8;ctx.beginPath();ctx.arc(0,0,BR*.45,0,Math.PI*2);ctx.stroke();
  for(let a=0;a<Math.PI*2;a+=Math.PI/3){ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*BR*.8,Math.sin(a)*BR*.8);ctx.stroke();}
  const sg=ctx.createRadialGradient(-BR*.3,-BR*.35,0,-BR*.3,-BR*.35,BR*.5);sg.addColorStop(0,'rgba(255,255,255,.55)');sg.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=sg;ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawPlayer(p,isH){
  ctx.save();ctx.translate(p.x,p.y);
  ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.ellipse(2,7,PR*.7,PR*.35,0,0,Math.PI*2);ctx.fill();
  if(isH){ctx.shadowColor='#EDBB00';ctx.shadowBlur=16;}
  ctx.save();ctx.beginPath();ctx.arc(0,0,PR,0,Math.PI*2);ctx.clip();
  if(p.team===0){ctx.fillStyle='#004D98';ctx.fillRect(-PR,-PR,PR*2,PR*2);for(let i=-2;i<=2;i++)if(i%2===0){ctx.fillStyle='#A50044';ctx.fillRect(i*(PR/2),-PR,PR/2,PR*2);}}
  else{ctx.fillStyle='#E8E8E8';ctx.fillRect(-PR,-PR,PR*2,PR*2);ctx.fillStyle='#C0A040';ctx.fillRect(-PR,-PR,PR*2,6);}
  ctx.restore();
  ctx.strokeStyle=isH?'rgba(237,187,0,.9)':'rgba(0,0,0,.5)';ctx.lineWidth=isH?2.5:1.5;ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(0,0,PR,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=p.team===0?'#fff':'#222';ctx.font='bold 10px Rajdhani,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.idx+1,0,1);
  if(isH){ctx.fillStyle='#EDBB00';ctx.font='8px sans-serif';ctx.fillText('★',0,-PR-7);}
  ctx.restore();
}

// ── HUD ────────────────────────────────────
function updateHUD(){
  document.getElementById('scoreBarca').textContent=S.score[0];
  document.getElementById('scoreMadrid').textContent=S.score[1];
  const s=Math.max(0,Math.ceil(S.time));
  document.getElementById('timerDisplay').textContent=`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}

// ── SCREENS ────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const hud=document.getElementById('hud'),tc=document.getElementById('touchControls');
  hud.style.display='none';tc.classList.remove('visible');
  if(id){document.getElementById(id).classList.add('active');}
  else{hud.style.display='flex';if('ontouchstart' in window||navigator.maxTouchPoints>0)tc.classList.add('visible');}
}
let lastGoalSeenSeq=0;
function showGoalNotif(team){
  const el=document.getElementById('goalNotif');
  el.textContent=team===0?'⚽ BARÇA VÄRAV!':'⚽ MADRID VÄRAV!';
  el.style.background=team===0?'linear-gradient(135deg,rgba(0,77,152,.95),rgba(165,0,68,.95))':'linear-gradient(135deg,rgba(150,110,20,.95),rgba(180,140,30,.95))';
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);
}

// ── NETWORK ────────────────────────────────
function broadcast(){if(conn&&conn.open)conn.send({type:'state',s:pack()});}
function pack(){
  return{bx:Math.round(S.ball.x),by:Math.round(S.ball.y),bvx:+S.ball.vx.toFixed(2),bvy:+S.ball.vy.toFixed(2),
    pl:S.players.map(p=>({t:p.team,i:p.idx,x:Math.round(p.x),y:Math.round(p.y)})),
    sc:[...S.score],half:S.half,time:+S.time.toFixed(1),phase:S.phase,sw:S.sidesSwapped,gseq:S.lastGoalSeq,gteam:S.lastGoalTeam};
}

// FIX: applyState always syncs screen; 'lobby' initial phase guarantees first 'play' triggers screen change
function applyState(d){
  S.ball={x:d.bx,y:d.by,vx:d.bvx,vy:d.bvy};
  S.players=d.pl.map(p=>({team:p.t,idx:p.i,x:p.x,y:p.y,vx:0,vy:0}));
  S.score=d.sc;S.half=d.half;S.time=d.time;S.sidesSwapped=d.sw;
  if(d.gseq>lastGoalSeenSeq){lastGoalSeenSeq=d.gseq;showGoalNotif(d.gteam);}
  const prev=S.phase;S.phase=d.phase;
  if(d.phase==='play'&&prev!=='play'){
    gameEverStarted=true;showScreen(null);
    document.getElementById('halfLabel').textContent=d.half===1?'1. POOLAEG':'2. POOLAEG';
  } else if(d.phase==='halftime'&&prev!=='halftime'){
    showScreen('screenHalftime');document.getElementById('htA').textContent=d.sc[0];document.getElementById('htB').textContent=d.sc[1];
  } else if(d.phase==='fulltime'&&prev!=='fulltime'){
    showScreen('screenFulltime');S.score=d.sc;renderFT();
  }
  updateHUD();
}

// ── FULLSCREEN ─────────────────────────────
function tryFS(){try{const e=document.documentElement;if(e.requestFullscreen)e.requestFullscreen({navigationUI:'hide'});else if(e.webkitRequestFullscreen)e.webkitRequestFullscreen();}catch(e){}}

// ── HOST SETUP ─────────────────────────────
function startHost(){
  tryFS();showScreen('screenWaiting');
  const code=String(Math.floor(100000+Math.random()*900000));
  document.getElementById('codeDisplay').textContent=code;
  peer=new Peer('laclasica-'+code,{debug:0});
  peer.on('open',()=>{document.getElementById('statusMsg').innerHTML='<span class="status-dot"></span>Ootan ühendust…';});
  peer.on('connection',c=>{
    conn=c;
    c.on('open',()=>{
      document.getElementById('statusMsg').innerHTML='<span class="status-dot" style="background:#00e676"></span>Ühendatud!';
      setTimeout(()=>{startGame();broadcast();},600);
    });
    c.on('data',d=>{if(d.type==='input'){GI.dx=d.dx;GI.dy=d.dy;if(d.kick)GI.kick=true;if(d.pass)GI.pass=true;}});
    c.on('close',()=>{});
  });
  peer.on('error',e=>document.getElementById('statusMsg').textContent='Viga: '+e.type);
}

// ── GUEST SETUP ────────────────────────────
function startGuest(code){
  tryFS();showScreen('screenWaiting');
  document.getElementById('waitSubtitle').textContent='Ühendan…';
  document.getElementById('codeLabel').textContent='Kood';
  document.getElementById('codeDisplay').textContent=code;
  document.getElementById('btnCopyCode').style.display='none';
  document.getElementById('statusMsg').innerHTML='<span class="status-dot"></span>Ühendan…';
  peer=new Peer({debug:0});
  peer.on('open',()=>{
    conn=peer.connect('laclasica-'+code,{reliable:true});
    conn.on('open',()=>{document.getElementById('statusMsg').innerHTML='<span class="status-dot" style="background:#00e676"></span>Ühendatud! Oota…';});
    conn.on('data',d=>{if(d.type==='state')applyState(d.s);});
    conn.on('close',()=>{});
  });
  peer.on('error',()=>{document.getElementById('errorMsg').textContent='Ei leia mängu. Kontrolli koodi.';showScreen('screenLobby');});
}
function sendInput(){if(conn&&conn.open){conn.send({type:'input',dx:LI.dx,dy:LI.dy,kick:LI.kick,pass:LI.pass});LI.kick=false;LI.pass=false;}}

// ── START GAME ─────────────────────────────
function startGame(){
  S.half=1;S.time=HALF_DUR;S.score=[0,0];S.phase='play';
  S.sidesSwapped=false;S.lastGoalTeam=-1;S.lastGoalSeq=0;S.goalCooldown=0;
  gameEverStarted=true;initPlayers(false);showScreen(null);
  document.getElementById('halfLabel').textContent='1. POOLAEG';lastTick=null;updateHUD();
}

// ── KEYBOARD ───────────────────────────────
const keys={};
addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '||e.key==='Enter')e.preventDefault();});
addEventListener('keyup',e=>{keys[e.key]=false;});
function readKeys(){
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])dx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D'])dx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W'])dy-=1;
  if(keys['ArrowDown']||keys['s']||keys['S'])dy+=1;
  if(dx&&dy){dx*=.707;dy*=.707;}
  LI.dx=dx;LI.dy=dy;
  if((keys[' ']||keys['Enter'])&&!LI.kick)LI.kick=true;
  if(keys['f']||keys['F'])LI.pass=true;
}

// ── TOUCH ──────────────────────────────────
const joyWrap=document.getElementById('joystickWrap'),joyKnob=document.getElementById('joystickKnob');
let joyId=null,joyC={x:0,y:0};const JR=34;
joyWrap.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0],r=joyWrap.getBoundingClientRect();joyC={x:r.left+r.width/2,y:r.top+r.height/2};joyId=t.identifier;},{passive:false});
document.addEventListener('touchmove',e=>{if(joyId===null)return;for(const t of e.changedTouches){if(t.identifier!==joyId)continue;let dx=t.clientX-joyC.x,dy=t.clientY-joyC.y;const d=Math.hypot(dx,dy);if(d>JR){dx=dx/d*JR;dy=dy/d*JR;}joyKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;LI.dx=dx/JR;LI.dy=dy/JR;}},{passive:false});
document.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===joyId){joyId=null;joyKnob.style.transform='translate(-50%,-50%)';LI.dx=0;LI.dy=0;}}});
const kickBtn=document.getElementById('kickBtn'),passBtn=document.getElementById('passBtn');
kickBtn.addEventListener('touchstart',e=>{e.preventDefault();LI.kick=true;kickBtn.classList.add('pressed');},{passive:false});
kickBtn.addEventListener('touchend',()=>kickBtn.classList.remove('pressed'));
passBtn.addEventListener('touchstart',e=>{e.preventDefault();LI.pass=true;passBtn.classList.add('pressed');},{passive:false});
passBtn.addEventListener('touchend',()=>passBtn.classList.remove('pressed'));
kickBtn.addEventListener('mousedown',()=>{LI.kick=true;kickBtn.classList.add('pressed');});kickBtn.addEventListener('mouseup',()=>kickBtn.classList.remove('pressed'));
passBtn.addEventListener('mousedown',()=>{LI.pass=true;passBtn.classList.add('pressed');});passBtn.addEventListener('mouseup',()=>passBtn.classList.remove('pressed'));

// ── MAIN LOOP ──────────────────────────────
let fc=0;
function loop(now){
  requestAnimationFrame(loop);
  if(S.phase==='play'){
    readKeys();
    if(role==='host'){tickTimer(now);physicsStep();updateHUD();fc++;if(fc%2===0)broadcast();}
    else if(role==='guest'){fc++;if(fc%2===0)sendInput();}
  }
  draw();
}
requestAnimationFrame(loop);

// ── BUTTON HANDLERS ────────────────────────
document.getElementById('btnHost').addEventListener('click',()=>{role='host';startHost();});
document.getElementById('btnJoin').addEventListener('click',()=>{
  const code=document.getElementById('inputCode').value.trim();
  if(!/^\d{6}$/.test(code)){document.getElementById('errorMsg').textContent='Sisesta 6-kohaline kood';return;}
  role='guest';startGuest(code);
});
document.getElementById('btnCopyCode').addEventListener('click',()=>{
  const code=document.getElementById('codeDisplay').textContent.replace(/\s/g,'');
  navigator.clipboard?.writeText(code).then(()=>{document.getElementById('btnCopyCode').textContent='✓ Kopeeritud!';setTimeout(()=>document.getElementById('btnCopyCode').textContent='Kopeeri kood',2000);});
});
document.getElementById('inputCode').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btnJoin').click();});
document.getElementById('btnRestart').addEventListener('click',()=>{
  S.score=[0,0];S.half=1;S.time=HALF_DUR;S.sidesSwapped=false;S.lastGoalTeam=-1;S.lastGoalSeq=0;S.goalCooldown=0;
  initPlayers(false);S.phase='play';lastTick=null;showScreen(null);document.getElementById('halfLabel').textContent='1. POOLAEG';updateHUD();broadcast();
});
</script>
</body>
